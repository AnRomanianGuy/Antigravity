<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Antigravity</title>
  <style>
    /* Reset and base */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: 'Courier New', Courier, monospace;
    }

    /* The single game canvas fills the viewport */
    #game {
      display: block;
      cursor: default;
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <script src="dist/bundle.js"></script>
</body>
</html>
